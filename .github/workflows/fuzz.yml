name: Fuzz

# Scheduled and on-demand fuzzing of the Zig core/component loaders,
# interpreter, AOT compiler, and a differential interp-vs-AOT oracle.
# Crashes are uploaded as artifacts and — if any — the job fails so the next PR
# cannot merge until the crasher is triaged.
on:
  schedule:
    # 03:17 UTC daily — off-peak so runners are available.
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      duration_seconds:
        description: "Per-target fuzz duration in seconds"
        required: false
        default: "300"
      interp_fuel:
        description: "Per-export interpreter fuel for fuzz-interp"
        required: false
        default: "100000"
      target:
        description: "Fuzz target (all, loader, component-loader, interp, aot, diff, canon, wasi)"
        required: false
        default: "all"
  pull_request:
    paths:
      - src/runtime/**
      - src/component/**
      - src/compiler/**
      - src/tests/fuzz/**
      - tests/fuzz/**
      - .github/workflows/fuzz.yml

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        target: [loader, component-loader, interp, aot, diff, canon, wasi]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Install wasm-tools (generator + validator)
        run: |
          set -euo pipefail
          ver=1.219.0
          url=https://github.com/bytecodealliance/wasm-tools/releases/download/v${ver}/wasm-tools-${ver}-x86_64-linux.tar.gz
          curl -fsSL "$url" -o /tmp/wasm-tools.tgz
          sudo tar -C /usr/local/bin --strip-components=1 -xzf /tmp/wasm-tools.tgz \
            wasm-tools-${ver}-x86_64-linux/wasm-tools

      - name: Restore fuzz corpus
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .fuzz-corpus
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Seed corpus
        run: |
          mkdir -p .fuzz-corpus/${{ matrix.target }}
          # Seed from the existing malformed corpus and spec-generated wasm.
          if [ -d tests/malformed/fuzz ]; then
            cp -n tests/malformed/fuzz/*.wasm .fuzz-corpus/${{ matrix.target }}/ 2>/dev/null || true
          fi
          if [ -d tests/spec-json ]; then
            find tests/spec-json -maxdepth 1 -name '*.wasm' -exec cp -n {} .fuzz-corpus/${{ matrix.target }}/ \; || true
          fi
          if [ -d tests/fuzz/regression/${{ matrix.target }} ]; then
            cp -n tests/fuzz/regression/${{ matrix.target }}/*.wasm .fuzz-corpus/${{ matrix.target }}/ 2>/dev/null || true
          fi
          if [ "${{ matrix.target }}" = "component-loader" ]; then
            # Minimal component: "\0asm" plus version/layer 0x0001000d.
            printf '\000asm\015\000\001\000' > .fuzz-corpus/${{ matrix.target }}/minimal-component.wasm
          fi
          if [ "${{ matrix.target }}" = "interp" ] || [ "${{ matrix.target }}" = "diff" ]; then
            # Minimal core module exporting `run: () -> i32`.
            printf '\000asm\001\000\000\000\001\005\001\140\000\001\177\003\002\001\000\007\007\001\003run\000\000\012\006\001\004\000\101\052\013' > .fuzz-corpus/${{ matrix.target }}/minimal-interp-run.wasm
          fi
          if [ "${{ matrix.target }}" = "canon" ]; then
            # Header: mode=load_primitive, prim=string, ptr=0, len=8 + 16B "Hello, world!\0\0\0".
            printf '\x00\x0e\x00\x00\x00\x00\x08\x00\x00\x00Hello, world!\x00\x00\x00' > .fuzz-corpus/${{ matrix.target }}/seed-load-string.wasm
            # mode=validate_utf8, ptr=0, len=11, body "hello world".
            printf '\x01\x00\x00\x00\x00\x00\x0b\x00\x00\x00hello world' > .fuzz-corpus/${{ matrix.target }}/seed-validate-utf8.wasm
          fi
          if [ "${{ matrix.target }}" = "wasi" ]; then
            # validate-sandbox-path on "../escape" (op 0x08, len 0x09).
            printf '\x08\x09../escape' > .fuzz-corpus/${{ matrix.target }}/seed-sandbox.wasm
            # get-directories (op 0x07).
            printf '\x07' > .fuzz-corpus/${{ matrix.target }}/seed-get-dirs.wasm
            # get-type on handle 0 (op 0x00, handle byte 0x00).
            printf '\x00\x00' > .fuzz-corpus/${{ matrix.target }}/seed-get-type.wasm
          fi
          ls .fuzz-corpus/${{ matrix.target }} | wc -l

      - name: Build fuzz harness
        run: zig build fuzz -Doptimize=ReleaseSafe

      - name: Fuzz
        env:
          FUZZ_DURATION: ${{ github.event.inputs.duration_seconds || '600' }}
          FUZZ_TARGET: ${{ matrix.target }}
          FUZZ_CORPUS: .fuzz-corpus/${{ matrix.target }}
          FUZZ_INTERP_FUEL: ${{ github.event.inputs.interp_fuel || '100000' }}
        run: |
          mkdir -p .fuzz-crashes
          extra_args=()
          if [ "$FUZZ_TARGET" = "interp" ] || [ "$FUZZ_TARGET" = "diff" ]; then
            extra_args+=(--fuel "$FUZZ_INTERP_FUEL")
          fi
          ./zig-out/bin/fuzz-${FUZZ_TARGET} \
            --corpus "$FUZZ_CORPUS" \
            --crashes .fuzz-crashes \
            --duration "$FUZZ_DURATION" \
            "${extra_args[@]}"

      - name: Upload crashes
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: .fuzz-crashes
          if-no-files-found: ignore
          retention-days: 30

      - name: Save corpus
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fuzz-corpus-${{ matrix.target }}
          path: .fuzz-corpus/${{ matrix.target }}
          if-no-files-found: ignore
          retention-days: 7

      - name: Fail if any crasher was found
        run: |
          if [ -n "$(ls -A .fuzz-crashes 2>/dev/null || true)" ]; then
            echo "::error::Fuzzer found crashes in target ${{ matrix.target }}"
            ls -la .fuzz-crashes
            exit 1
          fi
