name: Publish wamr-bin to PyPI

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Extract version
        id: version
        run: |
          V="${{ github.event.workflow_run.head_branch }}"
          V="${V#v}"
          # Reject dev/pre-release versions
          if echo "$V" | grep -qE '(dev|alpha|beta|rc)'; then
            echo "::error::Skipping non-stable version: $V"
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
      - name: Build wheels
        run: uv run scripts/build_wheels.py ${{ steps.version.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
