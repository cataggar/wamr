name: Zig CI

on:
  push:
    branches: [zig, main]
  pull_request:
    branches: [zig, main]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x64
            shell: bash
          - os: ubuntu-22.04-arm
            name: linux-arm64
            shell: bash
          - os: macos-14
            name: macos-arm64
            shell: bash
          - os: windows-latest
            name: windows-x64
            shell: pwsh

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.15.2

      - name: Build (Debug)
        run: zig build

      - name: Unit tests
        run: zig build test

      - name: Build (ReleaseSafe)
        run: zig build -Doptimize=ReleaseSafe

      - name: Build (wasm32-wasi cross-compile)
        run: zig build -Doptimize=ReleaseSafe -Dtarget=wasm32-wasi -Dstrip=true

      - name: Spec tests (JSON)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ -d tests/spec-json ]; then
            result=$(./zig-out/bin/spec-test-runner tests/spec-json 2>&1 | tail -6)
            echo "$result"
            passed=$(echo "$result" | grep -oP 'Passed:\s+\K[0-9]+' || echo "0")
            failed=$(echo "$result" | grep -oP 'Failed:\s+\K[0-9]+' || echo "0")
            echo "Results: $passed passed, $failed failed"
            if [ "${failed:-0}" -gt 0 ]; then
              echo "::error::$failed spec test failures"
              exit 1
            fi
          else
            echo "::notice::No JSON spec tests found"
          fi

      - name: Spec tests (JSON — Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path tests/spec-json) {
            $result = & .\zig-out\bin\spec-test-runner.exe tests\spec-json 2>&1 | Select-Object -Last 6
            $result | ForEach-Object { Write-Host $_ }
            $joined = $result -join "`n"
            if ($joined -match 'Failed:\s+(\d+)') {
              $failed = [int]$Matches[1]
              if ($failed -gt 0) {
                Write-Host "::error::$failed spec test failures"
                exit 1
              }
            }
          } else {
            Write-Host "::notice::No JSON spec tests found"
          }

  wasi-test:
    name: Build & Test (wasm32-wasi via wasmtime)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.15.2

      - name: Install wasmtime
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"

      - name: Build for wasm32-wasi
        run: zig build -Doptimize=ReleaseSafe -Dtarget=wasm32-wasi -Dstrip=true

      - name: Run wamr via wasmtime
        run: |
          wasmtime --version
          # Smoke test: run the wasm binary with --help or similar
          wasmtime zig-out/bin/wamr.wasm -- --version || echo "wamr.wasm executed (exit code: $?)"

  # Summary job matching the required status check name for branch protection
  ci-summary:
    name: Build & Test
    runs-on: ubuntu-22.04
    needs: [build-and-test, wasi-test]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.build-and-test.result }}" != "success" ] || [ "${{ needs.wasi-test.result }}" != "success" ]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed"
