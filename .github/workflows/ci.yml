name: Zig CI

on:
  push:
    branches: [zig, main]
  pull_request:
    branches: [zig, main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.15.2

      - name: Build (Debug)
        run: zig build

      - name: Unit tests
        run: zig build test

      - name: Build (ReleaseSafe)
        run: zig build -Doptimize=ReleaseSafe

      - name: Build (wasm32-wasi)
        run: zig build -Doptimize=ReleaseSafe -Dtarget=wasm32-wasi -Dstrip=true

      - name: Spec tests (JSON — 20,901 conformance tests)
        run: |
          if [ -d tests/spec-json ]; then
            result=$(./zig-out/bin/spec-test-runner tests/spec-json 2>&1 | tail -6)
            echo "$result"
            passed=$(echo "$result" | grep -oP 'Passed:\s+\K[0-9]+')
            failed=$(echo "$result" | grep -oP 'Failed:\s+\K[0-9]+')
            echo "Results: $passed passed, $failed failed"
            if [ "$failed" -gt 0 ]; then
              echo "::error::$failed spec test failures"
              exit 1
            fi
          else
            echo "::notice::No JSON spec tests found"
          fi

      - name: Spec tests (.wast — extended testsuite)
        if: always()
        continue-on-error: true
        run: |
          if [ -d third_party/testsuite ]; then
            pass=0; fail=0; crash=0; total=0
            for f in third_party/testsuite/*.wast; do
              name=$(basename "$f")
              out=$(timeout 60 ./zig-out/bin/spec-test-runner "$f" 2>&1) || { crash=$((crash+1)); continue; }
              p=$(echo "$out" | grep -oP 'pass=\K[0-9]+' | tail -1)
              fl=$(echo "$out" | grep -oP 'fail=\K[0-9]+' | tail -1)
              pass=$((pass + ${p:-0}))
              fail=$((fail + ${fl:-0}))
              total=$((total + 1))
            done
            echo "Wast results: $pass passed, $fail failed, $crash crashed out of $total files"
          fi
