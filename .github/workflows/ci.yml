name: Zig CI

on:
  push:
    branches: [zig, main]
  pull_request:
    branches: [zig, main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.15.2

      - name: Build (Debug)
        run: zig build

      - name: Unit tests
        run: zig build test

      - name: Build (ReleaseSafe)
        run: zig build -Doptimize=ReleaseSafe

      - name: Spec tests
        run: |
          if [ -d third_party/testsuite ]; then
            result=$(./zig-out/bin/spec-test-runner third_party/testsuite 2>&1 | tail -6)
            echo "$result"
            passed=$(echo "$result" | grep -oP 'Passed:\s+\K[0-9]+')
            failed=$(echo "$result" | grep -oP 'Failed:\s+\K[0-9]+')
            echo "Results: $passed passed, $failed failed"
            if [ "$failed" -gt 0 ]; then
              echo "::warning::$failed spec test failures"
            fi
          elif [ -d tests/spec-json ]; then
            result=$(./zig-out/bin/spec-test-runner tests/spec-json 2>&1 | tail -6)
            echo "$result"
          else
            echo "::notice::No spec tests found"
          fi
