name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-linux
            name: linux-x64
          - os: ubuntu-22.04-arm
            target: aarch64-linux
            name: linux-arm64
          - os: macos-14
            target: aarch64-macos
            name: macos-arm64
          - os: windows-latest
            target: x86_64-windows
            name: windows-x64
          # Cross-compiled targets
          - os: ubuntu-22.04
            target: x86_64-macos
            name: macos-x64
          - os: ubuntu-22.04
            target: x86_64-linux-musl
            name: linux-musl-x64
          - os: ubuntu-22.04
            target: aarch64-linux-musl
            name: linux-musl-arm64
          - os: ubuntu-22.04
            target: riscv64-linux
            name: linux-riscv64
          - os: windows-latest
            target: aarch64-windows
            name: windows-arm64
          - os: ubuntu-22.04
            target: wasm32-wasi
            name: wasi

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }} -Dstrip=true -Dstack-protector=true "-Dversion=${{ steps.version.outputs.version }}"

      - name: Azure login (for signing)
        if: endsWith(matrix.target, '-windows')
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows binaries with Trusted Signing
        if: endsWith(matrix.target, '-windows')
        uses: azure/trusted-signing-action@b443cf8ea4124818d2ea9f043cba29fc3ec47b16 # v1.2.0
        with:
          endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.TRUSTED_SIGNING_PROFILE }}
          files-folder: zig-out/bin
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Package
        shell: bash
        run: |
          PKGNAME="wamr-${{ steps.version.outputs.version }}-${{ matrix.name }}"
          TOOLS="wamr wamrc"
          mkdir -p "$PKGNAME/bin"
          case "${{ matrix.target }}" in
            wasm32-wasi) EXT=".wasm" ;;
            *-windows)   EXT=".exe" ;;
            *)           EXT="" ;;
          esac
          for tool in $TOOLS; do
            cp "zig-out/bin/${tool}${EXT}" "$PKGNAME/bin/"
          done
          cp LICENSE README.md "$PKGNAME/"
          case "${{ matrix.target }}" in
            *-windows)
              if command -v zip &>/dev/null; then
                zip -r "$PKGNAME.zip" "$PKGNAME"
              else
                powershell -Command "Compress-Archive -Path '$PKGNAME' -DestinationPath '$PKGNAME.zip'"
              fi
              if command -v sha256sum &>/dev/null; then
                sha256sum "$PKGNAME.zip" > "$PKGNAME.zip.sha256"
              else
                shasum -a 256 "$PKGNAME.zip" > "$PKGNAME.zip.sha256"
              fi
              ;;
            *)
              tar czf "$PKGNAME.tar.gz" "$PKGNAME"
              if command -v sha256sum &>/dev/null; then
                sha256sum "$PKGNAME.tar.gz" > "$PKGNAME.tar.gz.sha256"
              else
                shasum -a 256 "$PKGNAME.tar.gz" > "$PKGNAME.tar.gz.sha256"
              fi
              ;;
          esac

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: zig-out/bin/
          output-file: wamr-${{ steps.version.outputs.version }}-${{ matrix.name }}.sbom.spdx.json
          upload-artifact: false

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.name }}
          path: |
            wamr-*.tar.gz
            wamr-*.zip
            wamr-*.sha256
            wamr-*.sbom.spdx.json

  source:
    name: Source tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package source
        run: |
          PKGNAME="wamr-${{ steps.version.outputs.version }}"
          git archive --format=tar --prefix="$PKGNAME/" HEAD | xz > "$PKGNAME.tar.xz"
          sha256sum "$PKGNAME.tar.xz" > "$PKGNAME.tar.xz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: source
          path: |
            wamr-*.tar.xz
            wamr-*.sha256

  release:
    name: Create Release
    needs: [build, source]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          merge-multiple: true

      - name: Get version
        id: version
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          echo "version=${RAW}" >> "$GITHUB_OUTPUT"
          PEP440=$(echo "$RAW" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+)-dev\.([0-9]+)$/\1.dev\2/')
          echo "pep440=${PEP440}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: |
            wamr-*.tar.gz
            wamr-*.tar.xz
            wamr-*.zip

      - name: Create release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          name: wamr ${{ steps.version.outputs.version }}
          body: |
            ## wamr ${{ steps.version.outputs.version }} — Zig rewrite

            Experimental fork of [bytecodealliance/wasm-micro-runtime](https://github.com/bytecodealliance/wasm-micro-runtime) rewritten from C to Zig.

            **Highlights:**
            - 99.9% spec conformance (20,878/20,901 assertions)
            - Build system: `build.zig` with cross-compilation
            - Zig 0.16.0 (pure Zig source, libc linked for stack canaries)
            - Built with `ReleaseSafe` (runtime safety checks) + stack protector
            - 11 platform targets (linux, macOS, Windows, musl, RISC-V, WASI)

            **Tools included:** wamr, wamrc

            **Install:**
            ```
            dist install cataggar/wamr@v${{ steps.version.outputs.version }}
            ```
            ```
            uv tool install wamr-bin==${{ steps.version.outputs.pep440 }}
            ```

            See [installation details](https://github.com/cataggar/wamr/issues/69) for more options.
          files: |
            wamr-*.tar.gz
            wamr-*.tar.xz
            wamr-*.zip
            wamr-*.sha256
            wamr-*.sbom.spdx.json
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'dev') }}
